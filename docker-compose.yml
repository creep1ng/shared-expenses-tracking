services:
  proxy:
    image: nginx:1.27-alpine
    depends_on:
      - frontend
      - backend
    ports:
      - "${PROXY_HTTP_PORT:-8080}:80"
    volumes:
      - ./infra/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - app

  frontend:
    image: ${FRONTEND_IMAGE:-ghcr.io/creep1ng/shared-expenses-tracking-frontend:main}
    environment:
      NODE_ENV: ${FRONTEND_NODE_ENV:-development}
      PORT: 3000
      NEXT_PUBLIC_API_BASE_PATH: ${NEXT_PUBLIC_API_BASE_PATH:-/api}
    expose:
      - "3000"
    networks:
      - app

  backend:
    image: ${BACKEND_IMAGE:-ghcr.io/creep1ng/shared-expenses-tracking-backend:main}
    environment:
      APP_ENV: ${APP_ENV:-development}
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://postgres:postgres@db:5432/shared_expenses}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      APP_HOST: 0.0.0.0
      APP_PORT: 8000
      SESSION_COOKIE_DOMAIN: ${SESSION_COOKIE_DOMAIN:-localhost}
      SESSION_COOKIE_SECURE: ${SESSION_COOKIE_SECURE:-false}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    expose:
      - "8000"
    networks:
      - app

  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-shared_expenses}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-shared_expenses}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app

  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    networks:
      - app

volumes:
  postgres_data:
  redis_data:

networks:
  app:
    driver: bridge
