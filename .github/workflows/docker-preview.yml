name: docker-preview

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  REGISTRY: ghcr.io
  FRONTEND_IMAGE_NAME: creep1ng/shared-expenses-tracking-frontend
  BACKEND_IMAGE_NAME: creep1ng/shared-expenses-tracking-backend

jobs:
  metadata:
    runs-on: ubuntu-latest
    outputs:
      frontend-image: ${{ steps.frontend_meta.outputs.tags }}
      backend-image: ${{ steps.backend_meta.outputs.tags }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Extract frontend metadata
        id: frontend_meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.FRONTEND_IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha

      - name: Extract backend metadata
        id: backend_meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.BACKEND_IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha

  publish-preview:
    runs-on: ubuntu-latest
    needs: metadata
    permissions:
      contents: read
      packages: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - component: frontend
            image_name: creep1ng/shared-expenses-tracking-frontend
            dockerfile: frontend/Dockerfile
            context: ./frontend
          - component: backend
            image_name: creep1ng/shared-expenses-tracking-backend
            dockerfile: backend/Dockerfile
            context: ./backend

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Check component scaffold
        id: scaffold
        run: |
          if [ -f "${{ matrix.dockerfile }}" ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Extract Docker metadata
        if: steps.scaffold.outputs.present == 'true'
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ matrix.image_name }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha

      - name: Build and push image
        if: steps.scaffold.outputs.present == 'true' && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository)
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Build image without push for forks or missing scaffold
        if: steps.scaffold.outputs.present == 'true' && github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name != github.repository
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: false
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Report skipped component
        if: steps.scaffold.outputs.present != 'true'
        run: |
          echo "Skipping ${{ matrix.component }} image publish because ${{ matrix.dockerfile }} is not present yet."
